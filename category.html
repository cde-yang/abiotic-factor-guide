function getQueryParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

function renderCategory() {
  const cat = getQueryParam('cat') || 'getting-started';
  const meta = CATEGORY_META[cat] || CATEGORY_META['getting-started'];
  const articles = ALL_ARTICLES.filter(a => a.category === cat);

  // Update meta
  document.title = `${meta.title} — Abiotic Factor Guide Wiki`;
  const metaDesc = document.querySelector('meta[name="description"]');
  if (!metaDesc) {
    const m = document.createElement('meta');
    m.name = 'description';
    m.content = `Abiotic Factor ${meta.title.toLowerCase()} — ${meta.description}`;
    document.head.appendChild(m);
  }
  const metaKw = document.querySelector('meta[name="keywords"]');
  if (!metaKw) {
    const m = document.createElement('meta');
    m.name = 'keywords';
    m.content = meta.keywords;
    document.head.appendChild(m);
  }

  const container = document.getElementById('category-content');
  container.innerHTML = `
    <!-- Breadcrumb -->
    <div class="breadcrumb mb-6">
      <a href="index.html">Home</a> <span>/</span> <span>${meta.title}</span>
    </div>

    <!-- Category Header -->

      <p class="text-[#9ca3af] text-lg max-w-3xl">${meta.description}</p>
      <p class="text-sm text-[#9ca3af] mt-3">${articles.length} article${articles.length !== 1 ? 's' : ''} in this category</p>
    </div>

    <!-- Article List -->
    <div class="space-y-4">
      ${articles.map(a => `
        <a href="${a.id}.html" class="block bg-[#1e2130] border border-[#2a2d3a] rounded-xl p-5 hover:border-[#f59e0b] transition-all group">
          <div class="flex items-start gap-4">
            <div class="flex-shrink-0 w-14 h-14 bg-[#0f1117] rounded-xl flex items-center justify-center text-2xl">${a.image}</div>
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-xs px-2 py-0.5 bg-${a.categoryColor}-500/20 text-${a.categoryColor}-400 rounded-full font-semibold">${a.categoryLabel}</span>
